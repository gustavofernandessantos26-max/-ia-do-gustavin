<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike - Cadastro de Membro</title>
    <style>
        /* CSS INTEGRADO PARA FACILITAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-nike {
            width: 60px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        p {
            color: #757575;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Formulário */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e5e5;
            border-radius: 3px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #111;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        /* Botão Estilo Nike */
        .btn-black {
            width: 100%;
            padding: 15px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 3px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .
